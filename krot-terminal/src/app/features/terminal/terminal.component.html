<div class="relative w-screen h-screen flex flex-col bg-[linear-gradient(to_right,#ffffff1a_1px,transparent_1px),linear-gradient(to_bottom,#ffffff1a_1px,transparent_1px)] bg-size-[25px_25px]">
    <header class="h-10 w-full p-3 flex justify-between items-center bg-slate-900 rounded-b-2xl">
        <div class="w-1/5 pl-3 flex justify-start">
            <p class="text-md text-muted-foreground font-medium">krot-terminal | 1.0.0</p>
        </div>
        <div class="flex-1 justify-center items-center">
            <p class="text-md text-muted-foreground text-center font-medium">{{ usernameServerPair() }}</p>
        </div>
        <div class="w-1/5 pr-3 flex justify-end gap-5">
            <p class="text-md font-medium">{{ time() }}</p>
            <app-battery size="md" [charge]="batteryStatus().charge" [charging]="batteryStatus().isCharging"></app-battery>
        </div>
    </header>
    <main class="relative w-full flex-1 bg-transparent overflow-hidden">
        @for (window of windowService.windows(); track window.app.id) {
            <app-frame [window]="window"></app-frame>
        }
    </main>
    <div class="mx-auto px-5 pb-5">
        <footer class="h-20 px-3 py-1 flex justify-center items-center gap-3 bg-slate-900 rounded-3xl">
            @for (app of windowService.systemApplications; track app.id) {
                <div class="flex flex-col items-center gap-2">
                    <div class="w-15 h-15 bg-slate-800 rounded-3xl transition-all duration-200 origin-bottom hover:w-20 hover:h-20 hover:-translate-y-5">
                        <button z-button zType="ghost" [zTooltip]="app.name" class="w-full h-full rounded-3xl" type="button" (click)="windowService.launch(app.id)">
                            <ng-icon size="30px" [name]="app.icon"/>
                        </button>
                    </div>
                    @if (windowService.isOpened(app.id)) {
                        <div class="w-3 h-1 bg-white rounded-full"></div>
                    }
                </div>
            }
        </footer>
    </div>
</div>
